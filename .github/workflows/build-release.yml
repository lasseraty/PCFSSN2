name: Build and Release Managed Solution.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Install Power Platform CLI
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Install npm dependencies
        run: npm install

      - name: Build PCF control
        run: npm run build

      - name: Init solution
        run: |
          mkdir -p SolutionBuild
          cd SolutionBuild
          pac solution init --publisher-name Bofor --publisher-prefix bfr
        shell: bash

      - name: Add PCF reference to solution
        run: |
          cd SolutionBuild
          pac solution add-reference --path ../
        shell: bash

      - name: Build managed solution
        run: |
          cd SolutionBuild
          dotnet build --configuration Release /p:SolutionPackageType=Managed
        shell: bash

      - name: Find output zip
        id: find_zip
        run: |
          $zip = Get-ChildItem -Path SolutionBuild -Recurse -Filter "*.zip" | Select-Object -First 1
          echo "ZIP_PATH=$($zip.FullName)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Finnish SSN PCF v1.0.${{ github.run_number }}
          files: ${{ steps.find_zip.outputs.ZIP_PATH }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
